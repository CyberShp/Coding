name: Rename Branch

# This workflow renames copilot/improve-coverage-and-consistency-tests
# to copilot/chonggou-refactor-observation-web
# Trigger: manually from GitHub UI (Actions tab → Rename Branch → Run workflow)

on:
  push:
    branches:
      - 'copilot/improve-coverage-and-consistency-tests'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm the branch rename'
        required: true
        default: 'no'

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.confirm == 'yes'
    steps:
      - name: Create new branch from current SHA
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const oldBranch = 'copilot/improve-coverage-and-consistency-tests';
            const newBranch = 'copilot/chonggou-refactor-observation-web';

            // Get the SHA of the old branch
            const { data: ref } = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${oldBranch}`,
            });
            const sha = ref.object.sha;
            console.log(`Current SHA of ${oldBranch}: ${sha}`);

            // Create new branch
            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${newBranch}`,
                sha,
              });
              console.log(`Created branch: ${newBranch}`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Branch ${newBranch} already exists, updating it...`);
                await github.rest.git.updateRef({
                  owner,
                  repo,
                  ref: `heads/${newBranch}`,
                  sha,
                  force: true,
                });
                console.log(`Updated branch: ${newBranch}`);
              } else {
                throw e;
              }
            }

            // Delete old branch
            await github.rest.git.deleteRef({
              owner,
              repo,
              ref: `heads/${oldBranch}`,
            });
            console.log(`Deleted branch: ${oldBranch}`);

            console.log('Branch rename complete!');
            console.log(`All commits from ${oldBranch} are now on ${newBranch}`);
